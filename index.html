<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perran Quay Retro Games</title>

<!-- Retro Pixel Font -->
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL STYLES ===== */

body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: radial-gradient(circle at top, #1a0033, #000000 70%);
    color: #00ffcc;
    text-align: center;
}

h1, h2 {
    text-shadow: 0 0 10px #00ffcc, 0 0 20px #ff00ff;
}

section {
    padding: 40px 20px;
}

/* ===== HEADER ===== */

header {
    padding: 30px 20px;
    border-bottom: 3px solid #ff00ff;
}

header h1 {
    font-size: 1.2rem;
}

header p {
    font-size: 0.7rem;
    color: #ff00ff;
}

/* ===== NAVIGATION ===== */

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    flex-wrap: wrap;
}

nav a {
    color: #00ffcc;
    text-decoration: none;
    font-size: 0.7rem;
    padding: 10px 15px;
    border: 2px solid #00ffcc;
    border-radius: 8px;
    transition: 0.3s;
}

nav a:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 15px #00ffcc;
}

/* ===== VIDEO ===== */

.video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    max-width: 900px;
    margin: 20px auto;
}

.video-container iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    border-radius: 12px;
    box-shadow: 0 0 20px #ff00ff;
}

/* ===== GAME CARDS ===== */

.card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: black;
    border: 3px solid #00ffcc;
    padding: 25px;
    width: 220px;
    border-radius: 12px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffcc;
    background: #111;
}

/* ===== FOOTER ===== */

footer {
    padding: 20px;
    border-top: 3px solid #ff00ff;
    font-size: 0.6rem;
    color: #ff00ff;
}

/* ===== MOBILE TWEAKS ===== */

@media (max-width: 600px) {
    header h1 {
        font-size: 0.9rem;
    }

    nav a {
        font-size: 0.6rem;
        padding: 8px 10px;
    }

    .card {
        width: 90%;
    }
}

</style>
</head>

<body>

<header>
    <h1>🕹️ Perran Quay Retro Games</h1>
    <p>Console Tutorial</p>
</header>

<nav>
    <a href="#video">🎥 Tutorial</a>
    <a href="#games">🧩 Games</a>
</nav>

<section id="video">
    <h2>🎥 Featured Tutorial</h2>
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="Retro Gaming Tutorial"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</section>

<section id="games">
    <h2>🧩 Retro Fun</h2>
    <div class="card-container">
        <div class="card">👾 Space Invaders</div>
        <div class="card">🍄 Super Platformer</div>
        <div class="card">🏁 Pixel Racer</div>
    </div>
</section>

<footer>
    <p>© 2026 Perran Quay Retro Games</p>
</footer>

</body>
</html>
