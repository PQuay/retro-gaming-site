<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Perran Quay Retro Games</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

/* ===== GLOBAL STYLES ===== */

body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: radial-gradient(circle at top, #1a0033, #000000 70%);
    color: #00ffcc;
    text-align: center;
}

/* ===== ARCADE HEADER ===== */

.arcade-header {
    padding: 40px 20px;
    border-bottom: 3px solid #ff00ff;
}

.logo {
    width: 80%;
    max-width: 500px;
    height: auto;
    display: block;
    margin: 0 auto;

    animation: neonPulse 3s infinite ease-in-out;
}

/* Glow Animation */

@keyframes neonPulse {
    0% {
        filter: drop-shadow(0 0 15px #ff00ff)
                drop-shadow(0 0 25px #00ffff);
        transform: scale(1);
    }

    50% {
        filter: drop-shadow(0 0 35px #ff00ff)
                drop-shadow(0 0 60px #00ffff);
        transform: scale(1.03);
    }

    100% {
        filter: drop-shadow(0 0 15px #ff00ff)
                drop-shadow(0 0 25px #00ffff);
        transform: scale(1);
    }
}

.subtitle {
    margin-top: 20px;
    font-size: 0.7rem;
    color: #00ffcc;
    text-shadow: 0 0 10px #00ffcc;
}

/* ===== NAVIGATION ===== */

nav {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 15px;
    flex-wrap: wrap;
}

nav a {
    color: #00ffcc;
    text-decoration: none;
    font-size: 0.7rem;
    padding: 10px 15px;
    border: 2px solid #00ffcc;
    border-radius: 8px;
    transition: 0.3s;
}

nav a:hover {
    background: #00ffcc;
    color: black;
    box-shadow: 0 0 15px #00ffcc;
}

/* ===== VIDEO ===== */

.video-container {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    max-width: 900px;
    margin: 20px auto;
}

.video-container iframe {
    position: absolute;
    width: 100%;
    height: 100%;
    left: 0;
    top: 0;
    border-radius: 12px;
    box-shadow: 0 0 20px #ff00ff;
}

/* ===== GAME CARDS ===== */

.card-container {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
    margin-top: 30px;
}

.card {
    background: black;
    border: 3px solid #00ffcc;
    padding: 25px;
    width: 220px;
    border-radius: 12px;
    font-size: 0.7rem;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px #00ffcc;
    background: #111;
}

/* ===== FOOTER ===== */

footer {
    padding: 20px;
    border-top: 3px solid #ff00ff;
    font-size: 0.6rem;
    color: #ff00ff;
}

/* ===== MOBILE ===== */

@media (max-width: 600px) {

    .logo {
        max-width: 350px;
    }

    nav a {
        font-size: 0.6rem;
        padding: 8px 10px;
    }

    .card {
        width: 90%;
    }
}

</style>
</head>

<body>

<header class="arcade-header">
    <img src="neon-logo.png" alt="Perran Quay Holiday Park Neon Logo" class="logo">
    <p class="subtitle">Retro Gaming Hub</p>
</header>

<nav>
   
</nav>

<section id="video">
    <h2>🎥 Gaming Tutorial</h2>
    <div class="video-container">
        <iframe 
            src="Video.mov"
            title="Retro Gaming Tutorial"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</section>

<section id="games">

    </div>
</section>

<footer>
    <p>© 2026 Perran Quay Retro Games</p>
</footer>

</body>
</html>
